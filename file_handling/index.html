<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            background: rgba(7, 7, 219, 0.85);
            backdrop-filter: blur(20px);
            transition: padding 0.3s ease;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .nav-links a {
            color: black;
            text-decoration: none;
            text-align: center;
            text-transform: capitalize;
            font-family: 'Times New Roman', Times, serif;
            font-weight: bold;
            font-size: 28px;
        }
    </style>
</head>

<body>
    <nav id="navbar">
        <ul class="nav-links" id="navLinks">
            <li><a>Bank Account Management System</a></li>
        </ul>
    </nav>
</body>

</html>
